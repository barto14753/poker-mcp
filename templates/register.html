<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>Rejestracja - Poker MCP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <span class="auth-icon">♦️</span>
            <h1>Poker MCP</h1>
            <h2>Rejestracja</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Nazwa użytkownika</label>
                    <input type="text" id="username" name="username" placeholder="Min. 3 znaki" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="password">Hasło</label>
                    <input type="password" id="password" name="password" placeholder="Min. 6 znaków" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Potwierdź hasło</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Powtórz hasło" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Zarejestruj</button>
                <div id="error" class="error-message"></div>
            </form>
            <p class="auth-link">Masz już konto? <a href="/login">Zaloguj się</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                document.getElementById('error').textContent = 'Hasła nie są identyczne';
                return;
            }
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/';
                } else {
                    document.getElementById('error').textContent = data.error || 'Błąd rejestracji';
                }
            } catch (error) {
                document.getElementById('error').textContent = 'Błąd połączenia z serwerem';
            }
        });
    </script>
</body>
</html>
